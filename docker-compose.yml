version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinical-note-api
    ports:
      - "8000:8000"
    environment:
      # Core configuration
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      
      # Groq API configuration
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-70b-versatile}
      
      # LLM configuration
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0}
      - LLM_MAX_TOKENS_EXTRACT=${LLM_MAX_TOKENS_EXTRACT:-1000}
      - LLM_MAX_TOKENS_QUERY=${LLM_MAX_TOKENS_QUERY:-300}
      
    env_file:
      - .env
    
    # Mount logs directory for persistent logging
    volumes:
      - ./logs:/app/logs
    
    # Restart policy for production reliability
    restart: unless-stopped
    
    # Health check configuration
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network configuration
    networks:
      - clinical-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: clinical-note-frontend
    ports:
      - "8501:8501"
    environment:
      # Groq API configuration
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      
      # LLM configuration
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0}
      - LLM_MAX_TOKENS_EXTRACT=${LLM_MAX_TOKENS_EXTRACT:-1000}
      - LLM_MAX_TOKENS_QUERY=${LLM_MAX_TOKENS_QUERY:-300}
      
    env_file:
      - .env
    
    # Mount logs directory for persistent logging
    volumes:
      - ./logs:/app/logs
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network configuration
    networks:
      - clinical-network
    
    # Depends on API service (optional, for proper startup order)
    depends_on:
      api:
        condition: service_healthy

networks:
  clinical-network:
    driver: bridge
